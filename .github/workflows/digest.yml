name: Daily Heme/Onc Digest

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC = 08:00 Taipei (UTC+8)
  workflow_dispatch:        # "Run workflow" button in GitHub Actions tab

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit the report back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx feedparser anthropic

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: python generate_digest.py --output ./reports

      - name: Build reports index + latest.json
        run: python build_index.py

      - name: Commit report to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ manifests/
          git diff --cached --quiet || git commit -m "digest: $(date -u '+%Y-%m-%d')"
          git push

      - name: Notify lcchema-hub
        env:
          HUB_TOKEN: ${{ secrets.HUB_DISPATCH_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $HUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository_owner }}/lcchema-hub/dispatches" \
            -d '{"event_type":"digest-published"}'
