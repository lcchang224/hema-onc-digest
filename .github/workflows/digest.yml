name: Daily Heme/Onc Digest

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC = 08:00 Taipei (UTC+8)
  workflow_dispatch:        # "Run workflow" button in GitHub Actions tab

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit the report back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx feedparser anthropic

      - name: Generate digest & send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: |
          python generate_digest.py \
            --output ./reports \
            --email-to lcchang224@gmail.com

      - name: Build reports index
        run: |
          cd reports
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1">'
            echo '<title>Daily Heme/Onc Digest</title>'
            echo '<style>body{font-family:-apple-system,sans-serif;max-width:720px;margin:2rem auto;padding:0 1rem;color:#222;line-height:1.6}h1{font-size:1.4rem;border-bottom:1px solid #eee;padding-bottom:.4rem}a{color:#0066cc;text-decoration:none}a:hover{text-decoration:underline}li{margin:.3rem 0}.meta{color:#888;font-size:.85rem;margin-top:2rem}</style>'
            echo '</head><body>'
            echo '<h1>Daily Heme/Onc Digest</h1>'
            echo '<ul>'
            for f in $(ls hema_onc_digest_*.html 2>/dev/null | sort -r); do
              d="${f#hema_onc_digest_}"; d="${d%.html}"
              echo "<li><a href=\"$f\">$d</a></li>"
            done
            echo '</ul>'
            echo "<p class=\"meta\">Updated $(date -u '+%Y-%m-%d %H:%M UTC')</p>"
            echo '</body></html>'
          } > index.html

      - name: Commit report to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "digest: $(date -u '+%Y-%m-%d')"
          git push
